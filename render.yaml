services:
  - type: web
    name: pressd-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PG_HOST
        sync: false
      - key: PG_PORT
        sync: false
      - key: PG_DB
        sync: false
      - key: PG_USER
        sync: false
      - key: PG_PASSWORD
        sync: false
      - key: APP_URL
        sync: false
